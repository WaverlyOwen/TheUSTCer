<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The USTCer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        /* Critical CSS：兜住样式模块注入前的首屏（dev 下 CSS 由 JS 注入，防止裸文本闪现） */
        body, html { margin: 0; height: 100vh; overflow: hidden; font-family: "Jua", sans-serif; background-color: white; }
        #WA { opacity: 0; }
        #title { display: flex; align-items: flex-end; justify-content: center; position: fixed; top: 10vh; width: 100%; height: 10vh; font-size: min(8vh, 15vw); }
        #GPA { position: fixed; top: 20vh; width: 100%; text-align: center; font-size: min(3vh, 8vw); }
        #help { position: fixed; top: 3vh; right: 3vh; }
    </style>
</head>
<body>
    <div class="particle-network-animation"></div>
    <div id="title">The USTCer</div>
    <div id="GPA"></div>
    <div id="WA" style="opacity: 0">WRONG ANSWER</div>
    <button id="help" title="游戏规则">?</button>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
